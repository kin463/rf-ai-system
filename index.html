<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>R&F AIアシスタント</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .chat-messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; margin-bottom: 10px; padding: 10px; }
        .message { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="chat-messages" id="chatMessages"></div>
    <textarea id="userInput" placeholder="質問を入力..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">送信</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatMessages = document.getElementById('chatMessages');
            const question = input.value.trim();
            if (!question) return;

            // 顯示用戶訊息
            chatMessages.innerHTML += `<div class="message"><b>あなた:</b> ${question}</div>`;
            input.value = '';

            try {
                // 核心修正：將請求發送到您的 Render API
                const response = await fetch('https://rf-ai-system.onrender.com/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();
                chatMessages.innerHTML += `<div class="message"><b>AI:</b> ${data.answer}</div>`;
            } catch (error) {
                chatMessages.innerHTML += `<div class="message" style="color:red;">エラーが発生しました。</div>`;
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
