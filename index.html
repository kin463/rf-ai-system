<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>R&F AI アシスタント</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        textarea { width: 100%; height: 120px; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button#send-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #response { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; border-left: 5px solid #007bff; min-height: 50px; }
    </style>
</head>
<body>

    <h2>R&F 社員専用アシスタント</h2>
    <p>規定や帰社日について、お気軽にご質問ください。</p>

    <textarea id="input" placeholder="例：山下光輝の帰社日はいつ？ / 結婚祝金はいくら？"></textarea>
    <button id="send-btn" onclick="sendMessage()">送信</button>

    <div id="response">回答がここに表示されます...</div>

    <script>
        async function sendMessage() {
            const msg = document.getElementById('input').value;
            const resDiv = document.getElementById('response');
            resDiv.innerText = "考え中...";
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            resDiv.innerText = data.response;
        }
    </script>
</body>
</html>
