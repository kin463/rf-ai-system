<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&F 社員専用FAQシステム</title>
    <style>
        /* 整體背景與容器 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* 標題與說明 */
        h2 { color: #2d3436; margin-top: 0; text-align: center; }
        p { color: #636e72; font-size: 14px; text-align: center; margin-bottom: 25px; }

        /* 輸入區域 */
        textarea { width: 100%; height: 100px; padding: 15px; border: 2px solid #dfe6e9; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; transition: border 0.3s; resize: none; }
        textarea:focus { border-color: #0984e3; }

        /* 按鈕風格 */
        button { width: 100%; padding: 14px; background-color: #0984e3; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.3s; }
        button:hover { background-color: #74b9ff; }

        /* 結果顯示區 */
        #chatBox { margin-top: 25px; padding: 20px; background-color: #f1f2f6; border-radius: 12px; font-size: 15px; color: #2d3436; line-height: 1.6; min-height: 50px; white-space: pre-wrap; border-left: 5px solid #0984e3; }
    </style>
</head>
<body>

<div class="card">
    <h2>💼 社員専用FAQ</h2>
    <p>社内規定や緊急時の連絡についてお気軽にご質問ください。</p>

    <textarea id="userInput" placeholder="例：寝坊したらどうする？" onkeydown="handleKeyDown(event)"></textarea>
    <button onclick="sendQuestion()">質問する</button>

    <div id="chatBox">AIの回答がここに表示されます...</div>
</div>

<script>
    function handleKeyDown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendQuestion();
        }
    }

    async function sendQuestion() {
        const userInput = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const message = userInput.value;

        if (!message.trim()) return;

        chatBox.innerText = "思考中...";
        userInput.value = ""; 

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            chatBox.innerText = data.response;
        } catch (error) {
            chatBox.innerText = "通信エラーが発生しました。";
        }
    }
</script>

</body>
</html>
