<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>R&F AIアシスタント</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; margin: 0; }
        header { width: 100%; background: #007bff; color: white; padding: 20px; text-align: center; }
        .container { width: 90%; max-width: 600px; background: white; padding: 20px; margin-top: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #output { width: 100%; height: 300px; border: none; background: #f9f9f9; padding: 10px; overflow-y: scroll; white-space: pre-wrap; margin-bottom: 10px; border-radius: 5px; }
        .input-box { display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>R&F 株式会社</h1></header>
    <div class="container">
        <textarea id="output" readonly placeholder="質問を入力してください..."></textarea>
        <div class="input-box">
            <input type="text" id="input" placeholder="質問を入力...">
            <button onclick="send()">送信</button>
        </div>
    </div>
    <script>
        async function send() {
            let input = document.getElementById('input');
            let output = document.getElementById('output');
            let q = input.value;
            if(!q) return;
            output.value += "\n\nあなた: " + q;
            input.value = "";
            let res = await fetch('/api/chat', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({message: q})});
            let data = await res.json();
            output.value += "\n\nAI: " + data.response;
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
