<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社員専用FAQアシスタント</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .chat-card { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { font-size: 18px; color: #333; margin-bottom: 20px; text-align: center; }
        
        textarea { width: 100%; height: 90px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 14px; box-sizing: border-box; resize: none; outline: none; margin-bottom: 10px; }
        textarea:focus { border-color: #007bff; }
        
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        
        #chatBox { margin-top: 20px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; font-size: 14px; color: #555; line-height: 1.5; min-height: 60px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="chat-card">
    <h2>💼 社員専用FAQ</h2>
    <textarea id="userInput" placeholder="質問を入力してください..." onkeydown="handleKeyDown(event)"></textarea>
    <button onclick="sendQuestion()">送信</button>
    <div id="chatBox">AIの回答がここに表示されます。</div>
</div>

<script>
    function handleKeyDown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendQuestion();
        }
    }

    async function sendQuestion() {
        const userInput = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const message = userInput.value;

        if (!message.trim()) return;

        chatBox.innerText = "考え中...";
        userInput.value = ""; 

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            chatBox.innerText = data.response;
        } catch (e) {
            chatBox.innerText = "通信エラーが発生しました。";
        }
    }
</script>

</body>
</html>
