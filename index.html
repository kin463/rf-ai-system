<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI アシスタント</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        textarea { width: 100%; height: 100px; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="container">
    <h2 id="title">勤怠検索</h2>
    <button id="switchBtn">帰社日検索へ</button>
    <textarea id="message" placeholder="質問を入力..."></textarea>
    <button onclick="sendMessage()">送信</button>
    <div id="result">ここに回答が表示されます</div>
    <div id="feedback-btns" style="display:none; margin-top: 10px;">
        <button onclick="sendFeedback(true)">👍 良かった</button>
        <button onclick="sendFeedback(false)">👎 誤っている</button>
    </div>
</div>

<script>
    let currentMode = 'faq';
    let lastQuestion = '';

    async function sendMessage() {
        const message = document.getElementById('message').value;
        lastQuestion = message;
        document.getElementById('result').innerText = "考え中...";
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ message: message, mode: currentMode })
        });
        const data = await response.json();
        document.getElementById('result').innerText = data.response;
        document.getElementById('feedback-btns').style.display = 'block';
    }

    async function sendFeedback(isGood) {
        if (!isGood) {
            const resultText = document.getElementById('result').innerText;
            await fetch('/api/feedback', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ question: lastQuestion, correct_answer: "【修正要】AIの回答: " + resultText })
            });
            alert("ご指摘ありがとうございます。改善リストに記録しました。");
        } else {
            alert("評価ありがとうございます！");
        }
        document.getElementById('feedback-btns').style.display = 'none';
    }

    document.getElementById('switchBtn').onclick = () => {
        currentMode = (currentMode === 'faq') ? 'kisha' : 'faq';
        document.getElementById('title').innerText = (currentMode === 'kisha') ? '帰社日検索' : '勤怠検索';
        document.getElementById('switchBtn').innerText = (currentMode === 'kisha') ? '勤怠検索へ戻る' : '帰社日検索へ';
    };
</script>
</body>
</html>
