<!DOCTYPE html>
<html>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <button onclick="switchMode('kisha')">帰社日検索</button>
        <button onclick="switchMode('faq')">社員専用FAQ</button>
        <h2 id="modeTitle">帰社日検索</h2>
    </div>

    <textarea id="input" placeholder="質問を入力..."></textarea>
    <button onclick="sendMessage()">送信</button>
    <div id="output"></div>

    <script>
        let currentMode = 'kisha';
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeTitle').innerText = (mode === 'kisha' ? '帰社日検索' : '社員専用FAQ');
        }

        async function sendMessage() {
            const message = document.getElementById('input').value;
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message, mode: currentMode })
            });
            const data = await res.json();
            document.getElementById('output').innerText = data.response;
        }
    </script>
</body>
</html>
