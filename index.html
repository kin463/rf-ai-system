<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>R&F株式会社 社内AIアシスタント</title>
</head>
<body>
    <h1>🤖 AIアシスタント</h1>
    <textarea id="output" rows="10" cols="50" readonly></textarea><br>
    <textarea id="input" rows="3" cols="50" placeholder="質問を入力してください..."></textarea><br>
    <button onclick="sendQuestion()">送信</button>

    <script>
        async function sendQuestion() {
            const question = document.getElementById('input').value;
            const output = document.getElementById('output');
            
            output.value += "\nあなた: " + question;
            try {
                // ここで /api/ask を確実に叩く
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await response.json();
                output.value += "\nAI: " + data.answer;
            } catch (error) {
                output.value += "\nエラー: 通信に失敗しました。";
            }
        }
    </script>
</body>
</html>
