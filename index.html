<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AIアシスタント</title>
</head>
<body>
    <h1>🤖 AIアシスタント</h1>
    <textarea id="output" rows="10" cols="60" readonly></textarea><br>
    <textarea id="input" rows="3" cols="60" placeholder="質問を入力..."></textarea><br>
    <button onclick="sendQuestion()">送信</button>

    <script>
        async function sendQuestion() {
            const output = document.getElementById('output');
            const question = document.getElementById('input').value;
            output.value += "\nあなた: " + question;
            
            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question: question})
                });
                const data = await response.json();
                output.value += "\nAI: " + (data.answer || data.detail);
            } catch (e) {
                output.value += "\nAI: 通信エラーが発生しました。";
            }
        }
    </script>
</body>
</html>
