<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>R&F社内AIアシスタント</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f8f9fa; }
        #output { width: 100%; max-width: 700px; height: 400px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; overflow-y: auto; white-space: pre-wrap; background: white; }
        #input { width: 100%; max-width: 700px; padding: 10px; margin-top: 10px; border-radius: 5px; }
        button { padding: 10px 20px; margin-top: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🤖 R&F 社内AIアシスタント</h1>
    <textarea id="output" readonly placeholder="回答がここに表示されます..."></textarea><br>
    <textarea id="input" rows="3" placeholder="質問を入力..."></textarea><br>
    <button onclick="sendQuestion()">送信</button>

    <script>
        async function sendQuestion() {
            const output = document.getElementById('output');
            const input = document.getElementById('input');
            const question = input.value.trim();
            if (!question) return;

            output.value += "\n\n--- あなた ---\n" + question;
            input.value = "";
            output.scrollTop = output.scrollHeight;

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question: question})
                });
                const data = await response.json();
                output.value += "\n\n--- AI ---\n" + (data.answer || "回答生成エラー");
                output.scrollTop = output.scrollHeight;
            } catch (e) {
                output.value += "\n\n通信エラーが発生しました。";
            }
        }
    </script>
</body>
</html>
