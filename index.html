<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>社員専用FAQ</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { font-size: 18px; text-align: center; }
        textarea { width: 100%; height: 90px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 12px; margin-top: 10px; cursor: pointer; }
        #chatBox { margin-top: 20px; padding: 15px; background: #fdfdfd; border-radius: 12px; min-height: 60px; white-space: pre-wrap; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <h2>💼 社員専用FAQ</h2>
    <textarea id="userInput" placeholder="質問を入力..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuestion();}"></textarea>
    <button onclick="sendQuestion()">送信</button>
    <div id="chatBox">回答がここに表示されます。</div>
</div>
<script>
    async function sendQuestion() {
        const input = document.getElementById("userInput");
        const box = document.getElementById("chatBox");
        if(!input.value.trim()) return;
        box.innerText = "考え中...";
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: input.value})
        });
        const data = await res.json();
        box.innerText = data.response;
        input.value = "";
    }
</script>
</body>
</html>
