<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>R&F 社内AIアシスタント</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        h1 { color: #333; font-size: 1.5rem; }
        #output { width: 100%; max-width: 600px; height: 350px; padding: 15px; background: white; border: 1px solid #ccc; overflow-y: scroll; white-space: pre-wrap; margin-bottom: 10px; border-radius: 5px; }
        #input { width: 100%; max-width: 600px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <h1>🤖 R&F 社内AIアシスタント</h1>
    <textarea id="output" readonly placeholder="AIからの回答がここに表示されます..."></textarea><br>
    <textarea id="input" rows="3" placeholder="質問を入力..."></textarea><br>
    <button id="submitBtn" onclick="sendQuestion()">送信</button>

    <script>
        async function sendQuestion() {
            const output = document.getElementById('output');
            const input = document.getElementById('input');
            const btn = document.getElementById('submitBtn');
            const question = input.value.trim();
            
            if (!question) return;

            // 送信中の状態表示
            output.value += "\n\n--- あなた ---\n" + question;
            input.value = "";
            btn.disabled = true;
            btn.innerText = "回答生成中...";
            output.scrollTop = output.scrollHeight;

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question: question})
                });
                const data = await response.json();
                output.value += "\n\n--- AI ---\n" + (data.answer || "回答が生成されませんでした。");
                output.scrollTop = output.scrollHeight;
            } catch (e) {
                output.value += "\n\n通信エラーが発生しました。";
            } finally {
                btn.disabled = false;
                btn.innerText = "送信";
            }
        }
    </script>
</body>
</html>
