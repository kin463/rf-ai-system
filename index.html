<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&F AI アシスタント</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .mode-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .mode-card { 
            flex: 1; padding: 20px; border-radius: 12px; cursor: pointer; 
            text-align: center; transition: 0.3s; background: white; 
            border: 2px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .mode-card.active { border-color: #007bff; background: #e7f1ff; }
        .mode-card h3 { margin: 0; color: #333; }
        
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        button#send-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #response { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; min-height: 50px; border-left: 5px solid #007bff; }
    </style>
</head>
<body>

    <h2>目的を選択してください</h2>
    <div class="mode-container">
        <div class="mode-card active" id="kisha-card" onclick="selectMode('kisha')">
            <h3>帰社日検索</h3>
        </div>
        <div class="mode-card" id="faq-card" onclick="selectMode('faq')">
            <h3>社員専用FAQ</h3>
        </div>
    </div>

    <textarea id="input" placeholder="質問を入力してください..."></textarea>
    <button id="send-btn" onclick="sendMessage()">送信</button>

    <div id="response">回答がここに表示されます...</div>

    <script>
        let currentMode = 'kisha';

        function selectMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-card').forEach(card => card.classList.remove('active'));
            document.getElementById(mode + '-card').classList.add('active');
        }

        async function sendMessage() {
            const msg = document.getElementById('input').value;
            const resDiv = document.getElementById('response');
            resDiv.innerText = "考え中...";
            
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, mode: currentMode })
            });
            const data = await res.json();
            resDiv.innerText = data.response;
        }
    </script>
</body>
</html>
